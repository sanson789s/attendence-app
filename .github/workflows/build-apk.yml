# Builds the APK on GitHub's servers. Free, and nothing to install on your machine.
# Push to the repo, then grab the file from Actions > the run > Artifacts.
name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you press "Run workflow" by hand

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add the Android project
        run: npx cap add android

      - name: Grant location, camera and notification permissions
        run: python3 tools/patch-manifest.py

      - name: Sync web assets
        run: npx cap sync android

      - name: Build
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Rename it something friendly
        run: cp android/app/build/outputs/apk/debug/app-debug.apk attendance.apk

      - uses: actions/upload-artifact@v4
        with:
          name: attendance-apk
          path: attendance.apk
